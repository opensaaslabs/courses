name: Export Academy Graph

on:
  pull_request:
  push:
    branches: [main]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: python tools/export.py
      - uses: actions/upload-artifact@v4
        with:
          name: academy-exports
          path: exports/
