name: Conformance

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml jsonschema
      - name: Run Python reference conformance
        run: python reference/python/conformance_runner.py
      - uses: actions/upload-artifact@v4
        with:
          name: conformance-python-reference
          path: conformance/reports/python-reference.json
