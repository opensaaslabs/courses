name: Publish Academy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml jsonschema
      - name: Run reference validation implementation
        run: python tools/reference/python/validate.py
      - name: Run reference graph validation implementation
        run: python tools/reference/python/graph_validate.py
      - name: Run reference quality scoring implementation
        run: python tools/reference/python/quality_score.py
      - name: Run reference export implementation
        run: python tools/reference/python/export.py
      - name: Run reference publishing implementation
        run: python tools/reference/python/site_generator.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
